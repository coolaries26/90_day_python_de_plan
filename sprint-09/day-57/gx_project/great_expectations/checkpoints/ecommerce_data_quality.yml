name: ecommerce_data_quality
config_version: 1.0
template_name:
module_name: great_expectations.checkpoint
class_name: SimpleCheckpoint
run_name_template: '%Y%m%d-%H%M%S-ecommerce-dq'
expectation_suite_name:
batch_request: {}
action_list:
  - name: store_validation_result
    action:
      class_name: StoreValidationResultAction
  - name: store_evaluation_params
    action:
      class_name: StoreEvaluationParametersAction
  - name: update_data_docs
    action:
      class_name: UpdateDataDocsAction
evaluation_parameters: {}
runtime_configuration: {}
validations:
  - batch_request:
      datasource_name: ecommerce_db
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: dbt_dev_marts.mart_customer_ltv
    expectation_suite_name: mart_customer_ltv.basic
  - batch_request:
      datasource_name: ecommerce_db
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: dbt_dev_marts.mart_order_metrics
    expectation_suite_name: mart_order_metrics.basic
  - batch_request:
      datasource_name: ecommerce_db
      data_connector_name: default_inferred_data_connector_name
      data_asset_name: analytics.seller_performance
    expectation_suite_name: analytics.seller_performance.basic
profilers: []
ge_cloud_id:
expectation_suite_ge_cloud_id:
